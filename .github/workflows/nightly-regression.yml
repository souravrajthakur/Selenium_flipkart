name: Nightly Regression Tests

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 02:30 Asia/Kolkata (21:00 UTC).
    - cron: "0 21 * * *"

permissions:
  contents: write

concurrency:
  group: nightly-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regression:
    name: Run Flipkart regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: true
      TZ: Asia/Kolkata
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run TestNG regression suite
        id: regression-tests
        run: mvn -B -Dselenide.headless=true clean test

      - name: Generate Allure report
        if: always()
        continue-on-error: true
        run: mvn -B allure:report

      - name: Generate email HTML report
        id: email-report
        if: always()
        run: |
          mkdir -p target/email-attachments
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const resultsDir = path.join('target', 'allure-results');
          const outputFile = path.join('target', 'email-attachments', 'index.html');
          const statuses = ['passed', 'failed', 'broken', 'skipped', 'unknown'];

          function escapeHtml(value) {
            return String(value ?? '')
              .replaceAll('&', '&amp;')
              .replaceAll('<', '&lt;')
              .replaceAll('>', '&gt;')
              .replaceAll('"', '&quot;')
              .replaceAll("'", '&#39;');
          }

          function formatDuration(start, stop) {
            if (!start || !stop || stop < start) {
              return '-';
            }

            const seconds = Math.round((stop - start) / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return minutes > 0 ? `${minutes}m ${remainingSeconds}s` : `${remainingSeconds}s`;
          }

          const results = fs.existsSync(resultsDir)
            ? fs.readdirSync(resultsDir)
                .filter((file) => file.endsWith('-result.json'))
                .map((file) => {
                  const fullPath = path.join(resultsDir, file);
                  return JSON.parse(fs.readFileSync(fullPath, 'utf8'));
                })
            : [];

          const counts = Object.fromEntries(statuses.map((status) => [status, 0]));
          for (const result of results) {
            counts[result.status || 'unknown'] = (counts[result.status || 'unknown'] || 0) + 1;
          }

          const failedResults = results.filter((result) => ['failed', 'broken'].includes(result.status));
          const generatedAt = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
          const workflowRunUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const githubPagesUrl = `https://${process.env.GITHUB_REPOSITORY_OWNER}.github.io/${process.env.GITHUB_REPOSITORY.split('/')[1]}`;

          const rows = results
            .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
            .map((result) => `
              <tr>
                <td>${escapeHtml(result.name || result.fullName || 'Unnamed test')}</td>
                <td><span class="status ${escapeHtml(result.status || 'unknown')}">${escapeHtml(result.status || 'unknown')}</span></td>
                <td>${escapeHtml(formatDuration(result.start, result.stop))}</td>
              </tr>
            `)
            .join('');
          const testCaseLines = results
            .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
            .map((result, index) => {
              const name = result.name || result.fullName || 'Unnamed test';
              const status = (result.status || 'unknown').toUpperCase();
              const duration = formatDuration(result.start, result.stop);
              return `${index + 1}. ${name} - ${status} (${duration})`;
            })
            .join('\n');

          const failures = failedResults.length === 0
            ? '<p class="muted">No failed or broken tests.</p>'
            : failedResults.map((result) => `
                <section class="failure">
                  <h3>${escapeHtml(result.name || result.fullName || 'Unnamed test')}</h3>
                  <p><strong>Status:</strong> ${escapeHtml(result.status)}</p>
                  <pre>${escapeHtml(result.statusDetails?.message || result.statusDetails?.trace || 'No failure details available.')}</pre>
                </section>
              `).join('');

          const html = `<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Flipkart Allure Regression Report</title>
            <style>
              body { margin: 0; font-family: Arial, sans-serif; color: #172033; background: #f5f7fb; }
              .page { max-width: 1040px; margin: 0 auto; padding: 24px; }
              .header { background: #2874f0; color: #fff; padding: 24px; border-radius: 8px; }
              .header h1 { margin: 0 0 8px; font-size: 26px; }
              .header p { margin: 4px 0; }
              .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 18px 0; }
              .metric { background: #fff; border: 1px solid #e1e6f0; border-radius: 8px; padding: 16px; }
              .metric strong { display: block; font-size: 28px; margin-bottom: 4px; }
              .panel { background: #fff; border: 1px solid #e1e6f0; border-radius: 8px; padding: 18px; margin-top: 18px; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border-bottom: 1px solid #e9edf5; padding: 10px; text-align: left; vertical-align: top; }
              th { background: #f8fafc; }
              pre { white-space: pre-wrap; background: #101827; color: #eef4ff; padding: 12px; border-radius: 6px; overflow: auto; }
              .status { display: inline-block; min-width: 68px; padding: 4px 8px; border-radius: 999px; text-align: center; font-weight: bold; font-size: 12px; text-transform: uppercase; }
              .passed { background: #dcfce7; color: #166534; }
              .failed, .broken { background: #fee2e2; color: #991b1b; }
              .skipped { background: #fef3c7; color: #92400e; }
              .unknown { background: #e5e7eb; color: #374151; }
              .muted { color: #5c667a; }
              .failure { border-top: 1px solid #e9edf5; padding-top: 12px; }
              @media (max-width: 760px) { .summary { grid-template-columns: repeat(2, 1fr); } }
            </style>
          </head>
          <body>
            <main class="page">
              <section class="header">
                <h1>Flipkart Allure Regression Report</h1>
                <p>Generated: ${escapeHtml(generatedAt)} IST</p>
                <p>Repository: ${escapeHtml(process.env.GITHUB_REPOSITORY || '-')}</p>
                <p>Branch: ${escapeHtml(process.env.GITHUB_REF_NAME || '-')} | Run: ${escapeHtml(process.env.GITHUB_RUN_NUMBER || '-')}</p>
              </section>

              <section class="summary">
                <div class="metric"><strong>${results.length}</strong>Total</div>
                <div class="metric"><strong>${counts.passed || 0}</strong>Passed</div>
                <div class="metric"><strong>${counts.failed || 0}</strong>Failed</div>
                <div class="metric"><strong>${counts.broken || 0}</strong>Broken</div>
                <div class="metric"><strong>${counts.skipped || 0}</strong>Skipped</div>
              </section>

              <section class="panel">
                <h2>Failed Tests</h2>
                ${failures}
              </section>

              <section class="panel">
                <h2>All Tests</h2>
                <table>
                  <thead>
                    <tr><th>Test</th><th>Status</th><th>Duration</th></tr>
                  </thead>
                  <tbody>
                    ${rows || '<tr><td colspan="3">No Allure result files were found.</td></tr>'}
                  </tbody>
                </table>
              </section>

              <section class="panel">
                <p class="muted">Full interactive Allure assets are still uploaded in GitHub Actions artifacts. This attached index.html is the email-friendly Allure summary.</p>
                <p class="muted"><strong>View Full Allure Report:</strong> <a href="${escapeHtml(githubPagesUrl)}">${escapeHtml(githubPagesUrl)}</a></p>
                <p class="muted">Workflow run: <a href="${escapeHtml(workflowRunUrl)}">${escapeHtml(workflowRunUrl)}</a></p>
              </section>
            </main>
          </body>
          </html>`;

          fs.writeFileSync(outputFile, html);

          const plainBody = `Flipkart nightly regression report

Total test cases: ${results.length}
Passed: ${counts.passed || 0}
Failed: ${counts.failed || 0}
Broken: ${counts.broken || 0}
Skipped: ${counts.skipped || 0}

Test case report:
${testCaseLines || 'No Allure result files were found.'}

Failed or broken test details:
${failedResults.length === 0
  ? 'No failed or broken tests.'
  : failedResults.map((result) => {
      const name = result.name || result.fullName || 'Unnamed test';
      const details = result.statusDetails?.message || result.statusDetails?.trace || 'No failure details available.';
      return `- ${name}: ${details}`;
    }).join('\n\n')}

Repository: ${process.env.GITHUB_REPOSITORY || '-'}
Branch: ${process.env.GITHUB_REF_NAME || '-'}
Run number: ${process.env.GITHUB_RUN_NUMBER || '-'}
Full Allure Report: https://${process.env.GITHUB_REPOSITORY_OWNER}.github.io/${process.env.GITHUB_REPOSITORY.split('/')[1]}

The email-friendly Allure report is attached as index.html.`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<EMAIL_BODY\n${plainBody}\nEMAIL_BODY\n`);
          EOF

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          if-no-files-found: ignore

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin

      - name: Send email report
        if: always() && env.MAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Flipkart nightly regression: ${{ steps.regression-tests.outcome }}"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          attachments: target/email-attachments/index.html
          body: ${{ steps.email-report.outputs.body }}
