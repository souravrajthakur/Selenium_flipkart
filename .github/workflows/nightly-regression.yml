name: Nightly Regression Tests

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 02:30 Asia/Kolkata (21:00 UTC).
    - cron: "0 21 * * *"

permissions:
  contents: read

concurrency:
  group: nightly-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regression:
    name: Run Flipkart regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: true
      TZ: Asia/Kolkata
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run TestNG regression suite
        id: regression-tests
        continue-on-error: true
        run: mvn -B clean test

      - name: Generate Allure report
        if: always()
        continue-on-error: true
        run: mvn -B allure:report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
          if-no-files-found: ignore

      - name: Send email report
        if: always() && env.MAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Flipkart nightly regression: ${{ steps.regression-tests.outcome }}"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          body: |
            Flipkart nightly regression finished with status: ${{ steps.regression-tests.outcome }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Run number: ${{ github.run_number }}

            Reports are available in this workflow run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail workflow when tests fail
        if: steps.regression-tests.outcome == 'failure'
        run: exit 1
